name: playwrightTests

on:
  # Runs every day at 8:00 AM EST (1:00 PM UTC)
  schedule:
    - cron: "0 13 * * *"

  # Allows manual triggering from the GitHub UI
  workflow_dispatch:

jobs:
  playwright-tests:
    timeout-minutes: 30
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    # This is the setup environment for running Playwright tests on a daily schedule
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-chromium

      - name: Run Playwright tests
        run: npm run tests:headless

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
